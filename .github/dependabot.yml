# Keeps dependencies and GitHub Actions current (Phase 7 maintenance). Production deps are gated
# in CI by `npm run audit:prod`; this opens the update PRs that keep that gate green over time.
#
# Grouping policy: batch only minor/patch updates (safe, reviewable together). MAJOR updates come
# as individual PRs so breaking bumps (e.g. Vite, Vitest, ESLint, Tailwind, TypeScript, React) are
# evaluated and migrated one at a time — not merged as one blob.
version: 2
updates:
  - package-ecosystem: npm
    directory: '/'
    schedule:
      interval: weekly
    open-pull-requests-limit: 8
    groups:
      dev-minor-patch:
        dependency-type: development
        update-types: ['minor', 'patch']
      prod-minor-patch:
        dependency-type: production
        update-types: ['minor', 'patch']
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: '/'
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ['*']
    labels:
      - dependencies
      - ci
