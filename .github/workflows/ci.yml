name: CI

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - '.eslintrc.cjs'
      - '.github/workflows/ci.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'tailwind.config.js'
      - 'postcss.config.js'
      - '.eslintrc.cjs'
      - '.github/workflows/ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Check the app config mirrors the model (no drift from the docs)
        run: node scripts/check-app-config.mjs
      - name: Lint
        run: npm run lint
      - name: Unit tests (scoring engine + exporters)
        run: npm run test
      - name: Production build
        run: npm run build
