<!doctype html>
<html lang="id" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Architecture Advisor — a transparent, quality-attribute-driven architecture decision framework."
    />
    <title>Architecture Advisor</title>
    <script>
      // Apply persisted theme before paint to avoid a flash of the wrong theme.
      try {
        var t = localStorage.getItem('aa.theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
