<!doctype html>
<html lang="id" class="">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Architecture Advisor — a transparent, quality-attribute-driven architecture decision framework."
    />
    <title>Architecture Advisor</title>
    <script>
      // Dark by default (matches the design reference); apply light pre-paint if chosen.
      try {
        if (JSON.parse(localStorage.getItem('aa.theme')) === 'light') {
          document.documentElement.classList.add('light');
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
