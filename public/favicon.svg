<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Architecture Advisor">
  <!-- Brand mark v5 (Fase 2): minimal modern compass — ring, needle, hub — one color on a
       TRANSPARENT background. Black (elegant) in light contexts; auto-inverts for dark browser
       chrome via the embedded prefers-color-scheme rule. BrandMark.tsx mirrors this geometry. -->
  <style>
    :root { color: #0b0d1a; }
    @media (prefers-color-scheme: dark) { :root { color: #edeff7; } }
  </style>
  <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="6"/>
  <circle cx="50" cy="21" r="2.4" fill="currentColor" opacity="0.55"/>
  <circle cx="79" cy="50" r="2.4" fill="currentColor" opacity="0.55"/>
  <circle cx="50" cy="79" r="2.4" fill="currentColor" opacity="0.55"/>
  <circle cx="21" cy="50" r="2.4" fill="currentColor" opacity="0.55"/>
  <g transform="rotate(40 50 50)">
    <polygon points="50,19 58.5,50 41.5,50" fill="currentColor"/>
    <polygon points="50,81 56.5,50 43.5,50" fill="none" stroke="currentColor" stroke-width="4.6" stroke-linejoin="round"/>
  </g>
  <circle cx="50" cy="50" r="6" fill="currentColor"/>
</svg>
