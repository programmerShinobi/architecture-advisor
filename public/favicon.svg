<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="Architecture Advisor">
  <!-- Brand mark v2 (Fase 1): dark tile + aurora-gradient radar pentagon with a lit decision
       apex — "five dimensions, one recommendation", drawn as a modern constellation.
       Single source for header (BrandMark.tsx mirrors this), favicon and PWA icons. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8b7cff"/>
      <stop offset="0.55" stop-color="#38e1ff"/>
      <stop offset="1" stop-color="#7cf5c8"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.26" r="0.55">
      <stop offset="0" stop-color="#8b7cff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#8b7cff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="100" height="100" rx="23" fill="#0a0c1a"/>
  <rect width="100" height="100" rx="23" fill="url(#halo)"/>
  <!-- radar pentagon, gradient line -->
  <polygon points="50,25 76.6,44.3 66.4,75.6 33.6,75.6 23.4,44.3" fill="none" stroke="url(#g)" stroke-width="5" stroke-linejoin="round"/>
  <!-- data points on the four base vertices -->
  <circle cx="76.6" cy="44.3" r="3.4" fill="#38e1ff"/>
  <circle cx="66.4" cy="75.6" r="3.4" fill="#7cf5c8"/>
  <circle cx="33.6" cy="75.6" r="3.4" fill="#38e1ff"/>
  <circle cx="23.4" cy="44.3" r="3.4" fill="#8b7cff"/>
  <!-- the decision: one lit apex -->
  <circle cx="50" cy="25" r="9.5" fill="#0a0c1a"/>
  <circle cx="50" cy="25" r="7" fill="url(#g)"/>
  <circle cx="50" cy="25" r="2.8" fill="#ffffff"/>
</svg>
